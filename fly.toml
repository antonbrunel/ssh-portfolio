app = "ssh-portfolio"
primary_region = "cdg"

[build]

[env]
  SSH_PORT = "2222"

[[services]]
  internal_port = 2222
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 22

  [[services.tcp_checks]]
    grace_period = "15s"
    interval = "30s"
    timeout = "5s"
